<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="인테리어 준공 검수 체크리스트">
  <!-- 배경: 도토리 다크 브라운 -->
  <rect width="1200" height="630" fill="#5C3A1E"/>
  <!-- 크림색 가로선 질감 -->
  <g opacity="0.05" stroke="#F5F0EB" stroke-width="2">
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
  </g>
  <!-- 상단 카테고리 뱃지 -->
  <rect x="80" y="90" width="200" height="46" rx="23" fill="#C9A96E"/>
  <text x="180" y="122" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif" font-size="24" font-weight="700" fill="#5C3A1E" text-anchor="middle">인테리어 가이드</text>
  <!-- 메인 타이틀 -->
  <text x="80" y="270" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif" font-size="76" font-weight="800" fill="#F5F0EB">준공 검수 체크리스트</text>
  <text x="80" y="360" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif" font-size="76" font-weight="800" fill="#C9A96E">잔금 전 하자 점검</text>
  <!-- 서브 카피 -->
  <text x="80" y="430" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif" font-size="30" font-weight="500" fill="#F5F0EB" opacity="0.85">도배·바닥·욕실·전기까지 공정별 총정리</text>
  <!-- 체크박스 리스트 표현 -->
  <g>
    <rect x="86" y="498" width="34" height="34" rx="7" fill="none" stroke="#C9A96E" stroke-width="3"/>
    <path d="M94 515 l7 8 l14 -16" fill="none" stroke="#C9A96E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="146" y="498" width="34" height="34" rx="7" fill="none" stroke="#C9A96E" stroke-width="3"/>
    <path d="M154 515 l7 8 l14 -16" fill="none" stroke="#C9A96E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="206" y="498" width="34" height="34" rx="7" fill="none" stroke="#C9A96E" stroke-width="3" opacity="0.5"/>
  </g>
  <!-- 브랜드 -->
  <text x="1120" y="580" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif" font-size="28" font-weight="700" fill="#F5F0EB" text-anchor="end" opacity="0.7">얼마드나</text>
</svg>
