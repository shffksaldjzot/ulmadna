<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 470" font-family="-apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" role="img" aria-label="결로 해결 비용 — 처치 단계별 실제 단가 막대그래프">
  <rect width="720" height="470" fill="#faf7f4"/>
  <text x="24" y="40" font-size="20" font-weight="700" fill="#2b2b2b">결로 해결 비용, 어디까지 손대느냐로 갈립니다</text>
  <text x="24" y="62" font-size="13" fill="#8a8175">단위: 만원 · 방 1칸 또는 1개소 기준 · 곰팡이 번진 정도·면적에 따라 변동</text>

  <!-- gridlines 0~300 -->
  <g stroke="#e7ddd3" stroke-width="1">
    <line x1="230" y1="80" x2="230" y2="372"/>
    <line x1="307" y1="80" x2="307" y2="372"/>
    <line x1="383" y1="80" x2="383" y2="372"/>
    <line x1="460" y1="80" x2="460" y2="372"/>
    <line x1="537" y1="80" x2="537" y2="372"/>
    <line x1="613" y1="80" x2="613" y2="372"/>
    <line x1="690" y1="80" x2="690" y2="372"/>
  </g>
  <g font-size="11" fill="#a89e92" text-anchor="middle">
    <text x="230" y="390">0</text>
    <text x="307" y="390">50</text>
    <text x="383" y="390">100</text>
    <text x="460" y="390">150</text>
    <text x="537" y="390">200</text>
    <text x="613" y="390">250</text>
    <text x="690" y="390">300</text>
  </g>

  <!-- row labels -->
  <g font-size="13" fill="#3a3a3a" text-anchor="end">
    <text x="218" y="105">셀프 곰팡이 제거(약품)</text>
    <text x="218" y="147">탄성코트(베란다 1칸)</text>
    <text x="218" y="189">창틀 코킹 재시공(집 전체)</text>
    <text x="218" y="231">결로 도배(단열초배지·방 1칸)</text>
    <text x="218" y="273">곰팡이 제거·항균(방 1칸)</text>
    <text x="218" y="315">단열 재시공(벽 철거·방 1칸)</text>
    <text x="218" y="357">외벽 크랙 보수·방수</text>
  </g>

  <g>
    <!-- 셀프 1~3 -->
    <rect x="231" y="89" width="6" height="22" rx="3" fill="#d98b6a"/>
    <text x="245" y="105" font-size="11" fill="#6b5d52">1~3</text>
    <!-- 탄성코트 20~50 -->
    <rect x="261" y="131" width="46" height="22" rx="4" fill="#d98b6a"/>
    <text x="315" y="147" font-size="11" fill="#6b5d52">20~50</text>
    <!-- 창틀 코킹 30~80 -->
    <rect x="276" y="173" width="77" height="22" rx="4" fill="#d98b6a"/>
    <text x="361" y="189" font-size="11" fill="#6b5d52">30~80</text>
    <!-- 결로 도배 40~90 -->
    <rect x="291" y="215" width="77" height="22" rx="4" fill="#cf7a55"/>
    <text x="376" y="231" font-size="11" fill="#6b5d52">40~90</text>
    <!-- 곰팡이 제거·항균 50~120 -->
    <rect x="307" y="257" width="107" height="22" rx="4" fill="#cf7a55"/>
    <text x="422" y="273" font-size="11" fill="#6b5d52">50~120</text>
    <!-- 단열 재시공 150~280 -->
    <rect x="460" y="299" width="199" height="22" rx="4" fill="#a84e2c"/>
    <text x="651" y="315" font-size="11" fill="#ffffff" text-anchor="end" font-weight="600">150~280</text>
    <!-- 외벽 방수 150~300 -->
    <rect x="460" y="341" width="230" height="22" rx="4" fill="#a84e2c"/>
    <text x="682" y="357" font-size="11" fill="#ffffff" text-anchor="end" font-weight="600">150~300</text>
  </g>

  <text x="24" y="422" font-size="12" fill="#8a8175">※ 위 3개(옅은 막대)는 '표면·마감'을 손보는 처치, 아래 2개(진한 막대)는 원인을 뜯어내는 근본 공사입니다.</text>
  <text x="24" y="442" font-size="12" fill="#8a8175">※ 원인이 결로가 아니라 누수라면 아무리 도배·탄성코트를 해도 재발합니다 — 진단이 먼저예요.</text>
  <text x="24" y="462" font-size="12" fill="#8a8175">※ 곰팡이 제거·건조 단계를 생략하고 덮으면 1년 안에 같은 자리에 다시 올라옵니다.</text>
</svg>
