<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" font-family="'Pretendard','Apple SD Gothic Neo',sans-serif" role="img" aria-label="25평 59타입 인테리어 비용 공사 범위별 예산 막대그래프 — 부분 인테리어, 셀프 올수리, 주방·욕실 포함, 올수리 샷시 포함">
  <rect width="860" height="500" fill="#ffffff"/>
  <text x="40" y="46" font-size="25" font-weight="700" fill="#2b2b2b">25평(59타입) 인테리어 비용 — 공사 범위별 예산</text>
  <text x="40" y="74" font-size="15" fill="#8a8a8a">2026년 · 25평/59타입 아파트 기준 · 단위: 만원</text>

  <!-- baseline -->
  <line x1="40" y1="420" x2="830" y2="420" stroke="#dddddd" stroke-width="2"/>

  <!-- 부분 인테리어 1,000~2,000 -->
  <rect x="90" y="276" width="110" height="72" rx="4" fill="#C26B4A"/>
  <text x="145" y="268" font-size="16" fill="#a8512f" text-anchor="middle">1,000~2,000</text>
  <text x="145" y="448" font-size="15" font-weight="600" fill="#444" text-anchor="middle">부분 인테리어</text>
  <text x="145" y="468" font-size="12" fill="#999" text-anchor="middle">도배·바닥·조명·필름</text>

  <!-- 셀프 올수리 1,500~2,000 -->
  <rect x="290" y="276" width="110" height="36" rx="4" fill="#D9A38C"/>
  <text x="345" y="268" font-size="16" fill="#a8512f" text-anchor="middle">1,500~2,000</text>
  <text x="345" y="448" font-size="15" font-weight="600" fill="#444" text-anchor="middle">셀프(반셀프) 올수리</text>
  <text x="345" y="468" font-size="12" fill="#999" text-anchor="middle">품 팔아 아끼는 구간</text>

  <!-- 주방·욕실 포함 2,000~3,000 -->
  <rect x="490" y="204" width="110" height="72" rx="4" fill="#C26B4A"/>
  <text x="545" y="196" font-size="16" fill="#a8512f" text-anchor="middle">2,000~3,000</text>
  <text x="545" y="448" font-size="15" font-weight="600" fill="#444" text-anchor="middle">주방·욕실 포함(턴키)</text>
  <text x="545" y="468" font-size="12" fill="#999" text-anchor="middle">가장 많이 하는 구간</text>

  <!-- 올수리(샷시 포함) 3,000~4,000+ -->
  <rect x="690" y="132" width="110" height="72" rx="4" fill="#C26B4A"/>
  <text x="745" y="124" font-size="16" fill="#a8512f" text-anchor="middle">3,000~4,000+</text>
  <text x="745" y="448" font-size="15" font-weight="600" fill="#444" text-anchor="middle">올수리(샷시 포함)</text>
  <text x="745" y="468" font-size="12" fill="#999" text-anchor="middle">전체 철거+창호+확장</text>

  <text x="40" y="492" font-size="13" fill="#a0a0a0">※ 구축 연식·자재 등급·확장 여부에 따라 변동. 실제 견적 빅데이터 기준.</text>
</svg>
