<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="-apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" role="img" aria-label="발코니 확장 공사 항목별 비용 막대그래프">
  <rect width="720" height="420" fill="#faf7f4"/>
  <text x="24" y="40" font-size="20" font-weight="700" fill="#2b2b2b">발코니 확장, 항목별로 돈이 어디 들까</text>
  <text x="24" y="62" font-size="13" fill="#8a8175">거실 발코니 1개소 기준 · 단위: 만원 · 현장·자재 등급에 따라 변동</text>

  <!-- gridlines 0~200 -->
  <g stroke="#e7ddd3" stroke-width="1">
    <line x1="210" y1="80" x2="210" y2="330"/>
    <line x1="306" y1="80" x2="306" y2="330"/>
    <line x1="402" y1="80" x2="402" y2="330"/>
    <line x1="498" y1="80" x2="498" y2="330"/>
    <line x1="594" y1="80" x2="594" y2="330"/>
    <line x1="690" y1="80" x2="690" y2="330"/>
  </g>
  <g font-size="11" fill="#a89e92" text-anchor="middle">
    <text x="210" y="348">0</text>
    <text x="306" y="348">40</text>
    <text x="402" y="348">80</text>
    <text x="498" y="348">120</text>
    <text x="594" y="348">160</text>
    <text x="690" y="348">200</text>
  </g>

  <!-- row labels -->
  <g font-size="13" fill="#3a3a3a" text-anchor="end">
    <text x="198" y="107">철거 · 구조보강</text>
    <text x="198" y="147">단열공사(벽·바닥·천장)</text>
    <text x="198" y="187">창호(이중창 교체)</text>
    <text x="198" y="227">난방 배관 · 방수미장</text>
    <text x="198" y="267">바닥 마감(강마루)</text>
    <text x="198" y="307">도배 · 마감</text>
  </g>

  <g>
    <!-- 철거 40~70 -->
    <rect x="306" y="94" width="72" height="22" rx="4" fill="#d98b6a"/>
    <text x="384" y="110" font-size="11" fill="#6b5d52">40~70</text>
    <!-- 단열 60~120 -->
    <rect x="354" y="134" width="144" height="22" rx="4" fill="#a84e2c"/>
    <text x="504" y="150" font-size="11" fill="#6b5d52">60~120</text>
    <!-- 창호 120~200 -->
    <rect x="498" y="174" width="192" height="22" rx="4" fill="#c0653f"/>
    <text x="684" y="190" font-size="11" fill="#fbeee7" text-anchor="end">120~200</text>
    <!-- 난방·미장 70~120 -->
    <rect x="378" y="214" width="120" height="22" rx="4" fill="#cf7a55"/>
    <text x="504" y="230" font-size="11" fill="#6b5d52">70~120</text>
    <!-- 바닥마감 25~50 -->
    <rect x="270" y="254" width="60" height="22" rx="4" fill="#d98b6a"/>
    <text x="336" y="270" font-size="11" fill="#6b5d52">25~50</text>
    <!-- 도배 20~40 -->
    <rect x="258" y="294" width="48" height="22" rx="4" fill="#d98b6a"/>
    <text x="312" y="310" font-size="11" fill="#6b5d52">20~40</text>
  </g>

  <text x="24" y="378" font-size="12" fill="#8a8175">※ 단열은 가장 중요한데 가장 잘 깎이는 항목 — 노란 막대가 '곰팡이 안 생기는 집'을 가릅니다.</text>
  <text x="24" y="396" font-size="12" fill="#8a8175">※ 행위허가(구청 신고) 약 50만~100만원은 위 공사비와 별도. 거실 1개소 총합은 대략 500만~900만원.</text>
</svg>
