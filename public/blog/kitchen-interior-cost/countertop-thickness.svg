<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="-apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" role="img" aria-label="주방 상판 종류별 두께 비교 — 스테인레스 1.2T 절곡과 5T, 인조대리석 12T 고정, 엔지니어드 스톤 20T 고정">
  <rect width="720" height="340" fill="#faf7f4"/>
  <text x="24" y="40" font-size="20" font-weight="700" fill="#2b2b2b">상판 종류별 두께 (단면 비교)</text>
  <text x="24" y="62" font-size="13" fill="#8a8175">두께는 대부분 고정값 — 인조대리석 12T · 엔지니어드 스톤 20T · 스테인레스 5T 또는 1.2T 절곡</text>

  <!-- 바닥선 -->
  <line x1="40" y1="270" x2="690" y2="270" stroke="#cdbfae" stroke-width="2"/>

  <!-- 스테인레스 1.2T 절곡 -->
  <rect x="70" y="262" width="110" height="8" fill="#9aa3ad"/>
  <text x="125" y="252" font-size="13" font-weight="700" fill="#2b2b2b" text-anchor="middle">1.2T</text>
  <text x="125" y="292" font-size="12" fill="#8a8175" text-anchor="middle">스테인레스</text>
  <text x="125" y="308" font-size="12" fill="#8a8175" text-anchor="middle">(절곡)</text>

  <!-- 스테인레스 5T -->
  <rect x="220" y="235" width="110" height="35" fill="#8a939d"/>
  <text x="275" y="225" font-size="13" font-weight="700" fill="#2b2b2b" text-anchor="middle">5T</text>
  <text x="275" y="292" font-size="12" fill="#8a8175" text-anchor="middle">스테인레스</text>
  <text x="275" y="308" font-size="12" fill="#8a8175" text-anchor="middle">(솔리드)</text>

  <!-- 인조대리석 12T -->
  <rect x="370" y="186" width="110" height="84" fill="#d8b48a"/>
  <text x="425" y="176" font-size="13" font-weight="700" fill="#2b2b2b" text-anchor="middle">12T</text>
  <text x="425" y="292" font-size="12" fill="#8a8175" text-anchor="middle">인조대리석</text>
  <text x="425" y="308" font-size="12" fill="#8a8175" text-anchor="middle">(고정)</text>

  <!-- 엔지니어드 스톤 20T -->
  <rect x="520" y="130" width="110" height="140" fill="#5C3A1E"/>
  <text x="575" y="120" font-size="13" font-weight="700" fill="#2b2b2b" text-anchor="middle">20T</text>
  <text x="575" y="292" font-size="12" fill="#8a8175" text-anchor="middle">엔지니어드</text>
  <text x="575" y="308" font-size="12" fill="#8a8175" text-anchor="middle">스톤 (고정)</text>

  <text x="24" y="332" font-size="12" fill="#a89e92">※ 색상만 고르고 두께를 빠뜨리기 쉬운데, 두께는 종류별로 거의 정해져 있어요. 견적서에 종류·두께를 글자로 확인.</text>
</svg>
