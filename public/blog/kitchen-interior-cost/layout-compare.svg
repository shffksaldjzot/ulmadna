<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="-apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" role="img" aria-label="일자형 주방과 대면형 주방 비교 평면도 — 일자형은 벽을 보고 요리, 대면형은 아일랜드에서 거실을 보며 요리해 개방감이 크지만 설비공사가 따른다">
  <rect width="720" height="360" fill="#faf7f4"/>
  <text x="24" y="40" font-size="20" font-weight="700" fill="#2b2b2b">일자형 vs 대면형 주방 (평면 비교)</text>
  <text x="24" y="62" font-size="13" fill="#8a8175">대면형은 개방감↑ — 단, 후드 덕트·급배수·전기를 옮기는 설비 공사가 따라붙어 비용이 뜀</text>

  <!-- 왼쪽: 일자형 -->
  <rect x="40" y="90" width="290" height="210" rx="6" fill="#fff" stroke="#cdbfae" stroke-width="2"/>
  <text x="185" y="115" font-size="14" font-weight="700" fill="#5C3A1E" text-anchor="middle">일자형 (벽면)</text>
  <!-- 벽면 카운터 -->
  <rect x="60" y="135" width="250" height="26" fill="#5C3A1E"/>
  <text x="185" y="153" font-size="11" fill="#fff" text-anchor="middle">싱크대 (벽에 붙음)</text>
  <!-- 사람: 벽 보고 -->
  <circle cx="185" cy="195" r="13" fill="#c9a06f"/>
  <path d="M185 175 L185 168" stroke="#8a8175" stroke-width="2"/>
  <text x="185" y="225" font-size="12" fill="#8a8175" text-anchor="middle">↑ 벽 보고 요리</text>
  <text x="185" y="270" font-size="12" fill="#2e8b57" text-anchor="middle" font-weight="700">설비 그대로 → 비용 적음</text>
  <text x="185" y="288" font-size="11" fill="#8a8175" text-anchor="middle">개방감은 낮음</text>

  <!-- 오른쪽: 대면형 -->
  <rect x="390" y="90" width="290" height="210" rx="6" fill="#fff" stroke="#cdbfae" stroke-width="2"/>
  <text x="535" y="115" font-size="14" font-weight="700" fill="#5C3A1E" text-anchor="middle">대면형 (아일랜드)</text>
  <!-- 뒷벽 조리대 -->
  <rect x="410" y="132" width="250" height="20" fill="#cdbfae"/>
  <text x="535" y="147" font-size="10" fill="#6b6359" text-anchor="middle">조리대</text>
  <!-- 아일랜드(싱크볼 이동) -->
  <rect x="455" y="185" width="160" height="30" rx="4" fill="#5C3A1E"/>
  <text x="535" y="205" font-size="11" fill="#fff" text-anchor="middle">아일랜드 (싱크볼 이동)</text>
  <!-- 사람: 거실 보고 -->
  <circle cx="535" cy="240" r="13" fill="#c9a06f"/>
  <path d="M535 260 L535 267" stroke="#8a8175" stroke-width="2"/>
  <text x="535" y="288" font-size="12" fill="#8a8175" text-anchor="middle">↓ 거실 보며 요리 (개방감↑)</text>

  <text x="24" y="332" font-size="12" fill="#c0392b">※ 대면형 전환 = 후드 덕트 연장 + 급배수 이동 + 전기 증설. 비내력벽·배관 이동 가능 여부 사전 점검 필수.</text>
  <text x="24" y="350" font-size="11" fill="#a89e92">가구만 교체 700~1,000만 · 구조까지 1,000~1,500만 · 세라믹·빌트인 풀패키지 1,500만+</text>
</svg>
