<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" font-family="-apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" role="img" aria-label="주방 인테리어 견적서 공정별 단가 막대그래프 — 철거부터 가전 매립까지 항목별 비용 범위">
  <rect width="720" height="430" fill="#faf7f4"/>
  <text x="24" y="40" font-size="20" font-weight="700" fill="#2b2b2b">주방 견적서, 항목별로 뜯어보면</text>
  <text x="24" y="62" font-size="13" fill="#8a8175">단위: 만원 · 실제 견적 빅데이터 기준 · 24~34평(59~84타입) 아파트 주방 기준 · 자재 등급에 따라 변동</text>

  <!-- gridlines -->
  <g stroke="#e7ddd3" stroke-width="1">
    <line x1="200" y1="84" x2="200" y2="350"/>
    <line x1="296" y1="84" x2="296" y2="350"/>
    <line x1="392" y1="84" x2="392" y2="350"/>
    <line x1="488" y1="84" x2="488" y2="350"/>
    <line x1="584" y1="84" x2="584" y2="350"/>
    <line x1="680" y1="84" x2="680" y2="350"/>
  </g>
  <g font-size="11" fill="#a89e92" text-anchor="middle">
    <text x="200" y="368">0</text>
    <text x="296" y="368">100</text>
    <text x="392" y="368">200</text>
    <text x="488" y="368">300</text>
    <text x="584" y="368">400</text>
    <text x="680" y="368">500+</text>
  </g>

  <!-- row labels -->
  <g font-size="13" fill="#3a3a3a" text-anchor="end">
    <text x="188" y="114">싱크대 가구</text>
    <text x="188" y="158">상판(자재별)</text>
    <text x="188" y="202">가전 매립</text>
    <text x="188" y="246">벽·바닥 타일</text>
    <text x="188" y="290">조명·전기</text>
    <text x="188" y="334">철거·폐기물</text>
  </g>

  <g>
    <!-- 싱크대 가구 150~480 (가장 큰 비중) -->
    <rect x="344" y="98" width="317" height="22" rx="4" fill="#a84e2c"/>
    <text x="502" y="114" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="600">150~480 (기본형~맞춤·도장)</text>
    <!-- 상판 70~200 -->
    <rect x="267" y="142" width="125" height="22" rx="4" fill="#c0653f"/>
    <text x="400" y="158" font-size="11" fill="#6b5d52">70~200 (인조대리석~세라믹)</text>
    <!-- 가전 매립 100~200 -->
    <rect x="296" y="186" width="96" height="22" rx="4" fill="#c0653f"/>
    <text x="400" y="202" font-size="11" fill="#6b5d52">100~200 (식세기·인덕션 등)</text>
    <!-- 벽바닥 타일 70~180 -->
    <rect x="267" y="230" width="106" height="22" rx="4" fill="#d98b6a"/>
    <text x="381" y="246" font-size="11" fill="#6b5d52">70~180</text>
    <!-- 조명전기 70~140 -->
    <rect x="267" y="274" width="67" height="22" rx="4" fill="#d98b6a"/>
    <text x="342" y="290" font-size="11" fill="#6b5d52">70~140</text>
    <!-- 철거폐기물 40~70 -->
    <rect x="238" y="318" width="29" height="22" rx="4" fill="#cdbfb1"/>
    <text x="275" y="334" font-size="11" fill="#6b5d52">40~70</text>
  </g>

  <text x="24" y="398" font-size="12" fill="#8a8175">※ 싱크대 가구 + 상판이 전체 견적의 약 45~50%를 차지합니다. 여기서 등급을 정하면 총액이 정해져요.</text>
  <text x="24" y="418" font-size="12" fill="#8a8175">※ 급수배관·수전(20~50), 마감 필름·시트지(25~60)는 표에서 생략. 구조변경·아일랜드는 별도 가산.</text>
</svg>
