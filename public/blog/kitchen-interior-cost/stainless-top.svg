<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="-apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" role="img" aria-label="스테인레스 상판 일체형 구조 — 상판과 싱크볼을 용접해 이음새 없이 일체화. 일반 상판은 싱크볼 사이에 실리콘 이음새가 생김">
  <rect width="720" height="380" fill="#faf7f4"/>
  <text x="24" y="40" font-size="20" font-weight="700" fill="#2b2b2b">스테인레스 상판 — 용접 일체형 (이음새 없음)</text>
  <text x="24" y="62" font-size="13" fill="#8a8175">싱크볼과 상판을 용접해 한 몸으로. 이음새가 없어 물때·곰팡이가 안 끼고 위생적</text>

  <!-- 왼쪽: 일체형 -->
  <text x="180" y="100" font-size="14" font-weight="700" fill="#5C3A1E" text-anchor="middle">스테인레스 (일체형) ✓</text>
  <!-- 단면: 상판 + 싱크볼 연속 (이음새 없음) -->
  <path d="M40 130 L150 130 Q150 130 150 145 L150 250 Q150 270 170 270 L250 270 Q270 270 270 250 L270 145 Q270 130 270 130 L330 130"
        fill="none" stroke="#7a828c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 끊김 없음 강조 -->
  <text x="210" y="300" font-size="12" fill="#2e8b57" text-anchor="middle" font-weight="700">이음새 0 — 한 몸 용접</text>
  <text x="80" y="124" font-size="11" fill="#8a8175">바이브레이션 마감(상판)</text>
  <text x="210" y="332" font-size="11" fill="#8a8175" text-anchor="middle">엠보 마감(볼 안쪽)</text>
  <text x="345" y="180" font-size="11" fill="#8a8175">5T 또는</text>
  <text x="345" y="196" font-size="11" fill="#8a8175">1.2T 절곡</text>

  <!-- 구분선 -->
  <line x1="380" y1="90" x2="380" y2="340" stroke="#e7ddd3" stroke-width="1"/>

  <!-- 오른쪽: 일반(이음새) -->
  <text x="540" y="100" font-size="14" font-weight="700" fill="#8a8175" text-anchor="middle">일반 상판 (싱크볼 별도)</text>
  <!-- 상판 -->
  <rect x="410" y="130" width="100" height="10" fill="#c9a06f"/>
  <rect x="570" y="130" width="100" height="10" fill="#c9a06f"/>
  <!-- 싱크볼(별도, 드롭인) -->
  <path d="M510 140 L510 250 Q510 270 530 270 L550 270 Q570 270 570 250 L570 140"
        fill="none" stroke="#9aa3ad" stroke-width="6" stroke-linejoin="round"/>
  <!-- 이음새(실리콘) 강조 -->
  <circle cx="512" cy="138" r="5" fill="#c0392b"/>
  <circle cx="568" cy="138" r="5" fill="#c0392b"/>
  <text x="540" y="300" font-size="12" fill="#c0392b" text-anchor="middle" font-weight="700">이음새(실리콘)</text>
  <text x="540" y="318" font-size="11" fill="#8a8175" text-anchor="middle">물때·곰팡이·들뜸 발생 지점</text>

  <text x="24" y="362" font-size="12" fill="#a89e92">※ 장점: 이음새 없는 위생·청결. 단점: 비쌈 + 현장 가공 불가(가공 시 마감 타버림) → 실측이 매우 중요.</text>
</svg>
