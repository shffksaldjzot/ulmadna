<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="-apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" role="img" aria-label="가구 자재 친환경 등급 — 포름알데히드 방출량 SE0 0.3, E0 0.5, E1 1.5, E2 5.0 mg/L. SE0~E1은 친환경, E2 이상은 비친환경. 일반 제작은 E0 기준">
  <rect width="720" height="320" fill="#faf7f4"/>
  <text x="24" y="40" font-size="20" font-weight="700" fill="#2b2b2b">가구 자재 친환경 등급 — 포름알데히드(HCHO) 방출량</text>
  <text x="24" y="62" font-size="13" fill="#8a8175">등급이 낮을수록 방출이 적은 친환경 자재. 일반 제작은 E0 기준(0.5mg/L 이하)</text>

  <!-- E0 기준 표시 -->
  <text x="240" y="108" font-size="13" font-weight="700" fill="#5C3A1E" text-anchor="middle">★ 일반 제작 기준</text>
  <path d="M232 114 L248 114 L240 124 Z" fill="#5C3A1E"/>

  <!-- 등급 막대 (좌=친환경 → 우=비친환경) -->
  <rect x="60"  y="132" width="120" height="54" fill="#2e7d4f"/>
  <rect x="180" y="132" width="120" height="54" fill="#4caf50" stroke="#5C3A1E" stroke-width="3"/>
  <rect x="300" y="132" width="140" height="54" fill="#b6a829"/>
  <rect x="440" y="132" width="220" height="54" fill="#c0392b"/>

  <g font-size="17" font-weight="700" fill="#fff" text-anchor="middle">
    <text x="120" y="166">SE0</text>
    <text x="240" y="166">E0</text>
    <text x="370" y="166">E1</text>
    <text x="550" y="166">E2~</text>
  </g>

  <!-- 방출량 값 -->
  <g font-size="13" fill="#6b6359" text-anchor="middle">
    <text x="120" y="208">0.3 mg/L</text>
    <text x="240" y="208">0.5 mg/L</text>
    <text x="370" y="208">1.5 mg/L</text>
    <text x="550" y="208">5.0 mg/L</text>
  </g>

  <!-- 친환경 / 비친환경 구분 -->
  <line x1="60" y1="228" x2="440" y2="228" stroke="#2e7d4f" stroke-width="2"/>
  <line x1="440" y1="228" x2="660" y2="228" stroke="#c0392b" stroke-width="2"/>
  <text x="250" y="248" font-size="13" font-weight="700" fill="#2e7d4f" text-anchor="middle">친환경 자재</text>
  <text x="550" y="248" font-size="13" font-weight="700" fill="#c0392b" text-anchor="middle">비친환경 (실내가구 부적합)</text>

  <text x="24" y="296" font-size="12" fill="#a89e92">※ 견적서·계약서에 "E0 등급"으로 명시받으면 안심. 너무 저가 브랜드는 가끔 E1으로 빠지기도 합니다.</text>
</svg>
