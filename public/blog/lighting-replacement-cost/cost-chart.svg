<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Pretendard','Apple SD Gothic Neo',sans-serif" role="img" aria-label="평형별 아파트 전체 LED 조명 교체 비용 막대그래프">
  <rect width="800" height="500" fill="#ffffff"/>
  <text x="40" y="46" font-size="25" font-weight="700" fill="#2b2b2b">평형별 아파트 전체 LED 조명 교체 비용</text>
  <text x="40" y="74" font-size="15" fill="#8a8a8a">거실·방·주방·욕실·현관 표준 평판등 전체 교체(제품+설치) 기준 · 단위: 만원</text>

  <!-- baseline -->
  <line x1="70" y1="420" x2="760" y2="420" stroke="#dddddd" stroke-width="2"/>

  <!-- 24평 (center 200) range 40~80 : top=300 h=60 -->
  <rect x="155" y="300" width="90" height="60" rx="4" fill="#C26B4A"/>
  <text x="200" y="292" font-size="16" fill="#a8512f" text-anchor="middle">40~80</text>
  <text x="200" y="448" font-size="16" font-weight="600" fill="#444" text-anchor="middle">24평 / 59타입</text>

  <!-- 30평 (center 400) range 50~100 : top=270 h=75 -->
  <rect x="355" y="270" width="90" height="75" rx="4" fill="#C26B4A"/>
  <text x="400" y="262" font-size="16" fill="#a8512f" text-anchor="middle">50~100</text>
  <text x="400" y="448" font-size="16" font-weight="600" fill="#444" text-anchor="middle">30평 / 74타입</text>

  <!-- 34평 (center 600) range 80~150 : top=195 h=105 -->
  <rect x="555" y="195" width="90" height="105" rx="4" fill="#C26B4A"/>
  <text x="600" y="187" font-size="16" fill="#a8512f" text-anchor="middle">80~150</text>
  <text x="600" y="448" font-size="16" font-weight="600" fill="#444" text-anchor="middle">34평 / 84타입</text>

  <text x="40" y="484" font-size="13" fill="#a0a0a0">※ 매입등·간접조명 등 전기 타공·배선 공사는 별도. 프리미엄 등기구·디자인등 선택 시 200만원 이상도. 실제 견적 빅데이터 기준.</text>
</svg>
