<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="-apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" role="img" aria-label="단열 공사 비용 — 공법별 실제 단가 막대그래프">
  <rect width="720" height="420" fill="#faf7f4"/>
  <text x="24" y="40" font-size="20" font-weight="700" fill="#2b2b2b">단열 공사, 공법별로 얼마나 들까</text>
  <text x="24" y="62" font-size="13" fill="#8a8175">공간 1곳 기준 · 단위: 만원 · 곰팡이 제거·마감 포함 여부에 따라 변동</text>

  <!-- gridlines 0~400 -->
  <g stroke="#e7ddd3" stroke-width="1">
    <line x1="210" y1="80" x2="210" y2="300"/>
    <line x1="306" y1="80" x2="306" y2="300"/>
    <line x1="402" y1="80" x2="402" y2="300"/>
    <line x1="498" y1="80" x2="498" y2="300"/>
    <line x1="594" y1="80" x2="594" y2="300"/>
    <line x1="690" y1="80" x2="690" y2="300"/>
  </g>
  <g font-size="11" fill="#a89e92" text-anchor="middle">
    <text x="210" y="318">0</text>
    <text x="306" y="318">80</text>
    <text x="402" y="318">160</text>
    <text x="498" y="318">240</text>
    <text x="594" y="318">320</text>
    <text x="690" y="318">400</text>
  </g>

  <!-- row labels -->
  <g font-size="13" fill="#3a3a3a" text-anchor="end">
    <text x="198" y="107">곰팡이 제거·약품(부분)</text>
    <text x="198" y="147">탄성코트(베란다 1칸)</text>
    <text x="198" y="187">이보드 덧방(1칸)</text>
    <text x="198" y="227">아이소핑크 철거·재시공(방)</text>
    <text x="198" y="267">우레탄폼 충진(확장방)</text>
  </g>

  <g>
    <!-- 곰팡이 제거 10~30 -->
    <rect x="222" y="94" width="24" height="22" rx="4" fill="#d98b6a"/>
    <text x="252" y="110" font-size="11" fill="#6b5d52">10~30</text>
    <!-- 탄성코트 20~50 -->
    <rect x="234" y="134" width="36" height="22" rx="4" fill="#d98b6a"/>
    <text x="276" y="150" font-size="11" fill="#6b5d52">20~50</text>
    <!-- 이보드 60~150 -->
    <rect x="282" y="174" width="108" height="22" rx="4" fill="#cf7a55"/>
    <text x="396" y="190" font-size="11" fill="#6b5d52">60~150</text>
    <!-- 아이소핑크 150~280 -->
    <rect x="390" y="214" width="156" height="22" rx="4" fill="#a84e2c"/>
    <text x="552" y="230" font-size="11" fill="#6b5d52">150~280</text>
    <!-- 우레탄폼 200~350 -->
    <rect x="450" y="254" width="180" height="22" rx="4" fill="#a84e2c"/>
    <text x="636" y="270" font-size="11" fill="#6b5d52">200~350</text>
  </g>

  <text x="24" y="352" font-size="12" fill="#8a8175">※ 표면만 덮는 탄성코트와 벽을 뜯어 단열층을 다시 만드는 공사는 목적이 다릅니다 — 싸다고 같은 게 아니에요.</text>
  <text x="24" y="372" font-size="12" fill="#8a8175">※ 베란다 전체·여러 방을 한 번에 하면 300만~800만원대. 도배는 대부분 별도입니다.</text>
  <text x="24" y="392" font-size="12" fill="#8a8175">※ 진갈색 막대일수록 '벽을 뜯는' 근본 공사 — 결로·곰팡이를 실제로 잡는 구간입니다.</text>
</svg>
