<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="-apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" role="img" aria-label="내단열 공사 6단계 시공 순서 — 보양부터 도배까지">
  <rect width="720" height="300" fill="#faf7f4"/>
  <text x="24" y="40" font-size="20" font-weight="700" fill="#2b2b2b">제대로 된 단열 공사의 순서</text>
  <text x="24" y="62" font-size="13" fill="#8a8175">벽 한 칸(방) 기준 · 보통 2~3일 소요 · 곰팡이 상태에 따라 하루 더</text>

  <!-- connecting line -->
  <line x1="80" y1="150" x2="640" y2="150" stroke="#e2d5c8" stroke-width="3"/>

  <g text-anchor="middle">
    <!-- 1 보양 -->
    <circle cx="80" cy="150" r="26" fill="#d98b6a"/>
    <text x="80" y="157" font-size="18" font-weight="700" fill="#fff">1</text>
    <text x="80" y="200" font-size="13" fill="#3a3a3a">보양</text>
    <text x="80" y="220" font-size="11" fill="#8a8175">가구·바닥</text>
    <text x="80" y="234" font-size="11" fill="#8a8175">비닐 차단</text>

    <!-- 2 철거 -->
    <circle cx="192" cy="150" r="26" fill="#cf7a55"/>
    <text x="192" y="157" font-size="18" font-weight="700" fill="#fff">2</text>
    <text x="192" y="200" font-size="13" fill="#3a3a3a">철거</text>
    <text x="192" y="220" font-size="11" fill="#8a8175">기존 마감·</text>
    <text x="192" y="234" font-size="11" fill="#8a8175">부실 단열재</text>

    <!-- 3 곰팡이 제거·건조 -->
    <circle cx="304" cy="150" r="26" fill="#c0653f"/>
    <text x="304" y="157" font-size="18" font-weight="700" fill="#fff">3</text>
    <text x="304" y="200" font-size="13" fill="#3a3a3a">곰팡이 제거</text>
    <text x="304" y="220" font-size="11" fill="#8a8175">약품·건조</text>
    <text x="304" y="234" font-size="11" fill="#8a8175">(생략 금물)</text>

    <!-- 4 단열재 밀착 -->
    <circle cx="416" cy="150" r="26" fill="#a84e2c"/>
    <text x="416" y="157" font-size="18" font-weight="700" fill="#fff">4</text>
    <text x="416" y="200" font-size="13" fill="#3a3a3a">단열재 밀착</text>
    <text x="416" y="220" font-size="11" fill="#8a8175">아이소핑크</text>
    <text x="416" y="234" font-size="11" fill="#8a8175">직부착</text>

    <!-- 5 기밀 -->
    <circle cx="528" cy="150" r="26" fill="#cf7a55"/>
    <text x="528" y="157" font-size="18" font-weight="700" fill="#fff">5</text>
    <text x="528" y="200" font-size="13" fill="#3a3a3a">기밀</text>
    <text x="528" y="220" font-size="11" fill="#8a8175">이음새·틈</text>
    <text x="528" y="234" font-size="11" fill="#8a8175">우레탄폼</text>

    <!-- 6 마감·도배 -->
    <circle cx="640" cy="150" r="26" fill="#d98b6a"/>
    <text x="640" y="157" font-size="18" font-weight="700" fill="#fff">6</text>
    <text x="640" y="200" font-size="13" fill="#3a3a3a">마감·도배</text>
    <text x="640" y="220" font-size="11" fill="#8a8175">보드→도배</text>
    <text x="640" y="234" font-size="11" fill="#8a8175">(별도 비용)</text>
  </g>

  <text x="24" y="278" font-size="12" fill="#8a8175">※ 3번 '곰팡이 제거·건조'를 건너뛰고 덮으면, 단열해도 1년 안에 곰팡이가 다시 올라옵니다.</text>
</svg>
