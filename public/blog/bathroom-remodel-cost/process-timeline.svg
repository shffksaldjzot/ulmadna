<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="-apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" role="img" aria-label="욕실 리모델링 공정 순서 타임라인">
  <rect width="720" height="360" fill="#faf7f4"/>
  <text x="24" y="40" font-size="20" font-weight="700" fill="#2b2b2b">욕실 리모델링 공정 순서</text>
  <text x="24" y="62" font-size="13" fill="#8a8175">철거 → 설비·전기 → 방수 → 타일 → 도기 → 마감점검 (보이지 않는 공정이 절반)</text>

  <!-- connecting line -->
  <line x1="80" y1="120" x2="640" y2="120" stroke="#e0d4c8" stroke-width="3"/>

  <!-- step circles + labels -->
  <g text-anchor="middle">
    <!-- 1 철거 -->
    <circle cx="80" cy="120" r="22" fill="#d98b6a"/>
    <text x="80" y="127" font-size="16" font-weight="700" fill="#fff">1</text>
    <text x="80" y="166" font-size="13" font-weight="600" fill="#3a3a3a">철거</text>
    <text x="80" y="184" font-size="11" fill="#8a8175">1일</text>
    <!-- 2 설비전기 -->
    <circle cx="192" cy="120" r="22" fill="#cf7a55"/>
    <text x="192" y="127" font-size="16" font-weight="700" fill="#fff">2</text>
    <text x="192" y="166" font-size="13" font-weight="600" fill="#3a3a3a">설비·전기</text>
    <text x="192" y="184" font-size="11" fill="#8a8175">배관·콘센트 / 1일</text>
    <!-- 3 방수 -->
    <circle cx="304" cy="120" r="22" fill="#c0653f"/>
    <text x="304" y="127" font-size="16" font-weight="700" fill="#fff">3</text>
    <text x="304" y="166" font-size="13" font-weight="600" fill="#3a3a3a">방수</text>
    <text x="304" y="184" font-size="11" fill="#8a8175">2회 이상·건조 / 2일</text>
    <!-- 4 타일 -->
    <circle cx="416" cy="120" r="22" fill="#b85b38"/>
    <text x="416" y="127" font-size="16" font-weight="700" fill="#fff">4</text>
    <text x="416" y="166" font-size="13" font-weight="600" fill="#3a3a3a">타일</text>
    <text x="416" y="184" font-size="11" fill="#8a8175">1~2일</text>
    <!-- 5 도기 -->
    <circle cx="528" cy="120" r="22" fill="#a84e2c"/>
    <text x="528" y="127" font-size="16" font-weight="700" fill="#fff">5</text>
    <text x="528" y="166" font-size="13" font-weight="600" fill="#3a3a3a">도기·부속</text>
    <text x="528" y="184" font-size="11" fill="#8a8175">변기·세면대 / 반나절~1일</text>
    <!-- 6 마감 -->
    <circle cx="640" cy="120" r="22" fill="#8f4023"/>
    <text x="640" y="127" font-size="16" font-weight="700" fill="#fff">6</text>
    <text x="640" y="166" font-size="13" font-weight="600" fill="#3a3a3a">마감점검</text>
    <text x="640" y="184" font-size="11" fill="#8a8175">줄눈·구배 / 반나절</text>
  </g>

  <!-- duration bars -->
  <g>
    <rect x="80" y="232" width="280" height="26" rx="6" fill="#e9c9b8"/>
    <text x="92" y="250" font-size="13" font-weight="600" fill="#7a3c22">덧방 3~4일</text>
    <rect x="80" y="270" width="560" height="26" rx="6" fill="#c0653f"/>
    <text x="92" y="288" font-size="13" font-weight="600" fill="#fff">올철거 7~10일 (방수 건조시간 포함)</text>
  </g>
  <text x="24" y="332" font-size="12" fill="#8a8175">※ 방수는 한 번 잘못되면 아랫집 누수로 이어져, 건조시간을 줄이면 안 되는 공정입니다.</text>
</svg>
