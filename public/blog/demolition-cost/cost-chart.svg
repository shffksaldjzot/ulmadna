<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Pretendard','Apple SD Gothic Neo',sans-serif" role="img" aria-label="평형별 아파트 인테리어 전체 철거 비용 막대그래프">
  <rect width="800" height="500" fill="#ffffff"/>
  <text x="40" y="46" font-size="25" font-weight="700" fill="#2b2b2b">평형별 아파트 전체 철거 비용</text>
  <text x="40" y="74" font-size="15" fill="#8a8a8a">올철거(폐기물 처리 포함) 표준 조건 기준 · 단위: 만원</text>

  <!-- baseline -->
  <line x1="70" y1="420" x2="760" y2="420" stroke="#dddddd" stroke-width="2"/>

  <!-- 24평 (center 200) range 120~180 -->
  <rect x="160" y="312" width="80" height="108" rx="4" fill="#C26B4A"/>
  <text x="200" y="304" font-size="15" fill="#a8512f" text-anchor="middle">120~180</text>
  <text x="200" y="446" font-size="16" font-weight="600" fill="#444" text-anchor="middle">24평 / 59타입</text>

  <!-- 30평 (center 400) range 150~230 -->
  <rect x="360" y="282" width="80" height="138" rx="4" fill="#C26B4A"/>
  <text x="400" y="274" font-size="15" fill="#a8512f" text-anchor="middle">150~230</text>
  <text x="400" y="446" font-size="16" font-weight="600" fill="#444" text-anchor="middle">30평 / 74타입</text>

  <!-- 34평 (center 600) range 180~280 -->
  <rect x="560" y="252" width="80" height="168" rx="4" fill="#C26B4A"/>
  <text x="600" y="244" font-size="15" fill="#a8512f" text-anchor="middle">180~280</text>
  <text x="600" y="446" font-size="16" font-weight="600" fill="#444" text-anchor="middle">34평 / 84타입</text>

  <text x="40" y="484" font-size="13" fill="#a0a0a0">※ 욕실 설비·방수, 마루 샌딩, 사다리차, 고층·곰방 작업은 조건에 따라 추가. 실제 견적 빅데이터 기준 표준 범위.</text>
</svg>
