<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" font-family="'Pretendard','Apple SD Gothic Neo',sans-serif" role="img" aria-label="아트월 비용 재질별 범위 막대그래프 — 인테리어 필름, 유럽 미장, 템바보드 우드패널, 타일, 인조대리석, 천연대리석">
  <rect width="860" height="500" fill="#ffffff"/>
  <text x="40" y="46" font-size="25" font-weight="700" fill="#2b2b2b">아트월 비용 — 재질별 범위</text>
  <text x="40" y="74" font-size="15" fill="#8a8a8a">거실 TV 벽면 1면 기준 · 자재+시공 · 간접조명은 별도(30만~50만) · 단위: 만원</text>

  <line x1="40" y1="420" x2="830" y2="420" stroke="#dddddd" stroke-width="2"/>

  <!-- 필름 20~50 -->
  <rect x="75" y="372" width="80" height="29" rx="4" fill="#D9A38C"/>
  <text x="115" y="364" font-size="16" fill="#a8512f" text-anchor="middle">20~50</text>
  <text x="115" y="448" font-size="15" font-weight="600" fill="#444" text-anchor="middle">인테리어 필름</text>

  <!-- 유럽 미장 30~70 -->
  <rect x="200" y="352" width="80" height="39" rx="4" fill="#D9A38C"/>
  <text x="240" y="344" font-size="16" fill="#a8512f" text-anchor="middle">30~70</text>
  <text x="240" y="448" font-size="15" font-weight="600" fill="#444" text-anchor="middle">유럽 미장</text>

  <!-- 템바보드·우드 50~120 -->
  <rect x="325" y="304" width="80" height="68" rx="4" fill="#C26B4A"/>
  <text x="365" y="296" font-size="16" fill="#a8512f" text-anchor="middle">50~120</text>
  <text x="365" y="448" font-size="15" font-weight="600" fill="#444" text-anchor="middle">템바보드·우드</text>

  <!-- 타일 60~150 -->
  <rect x="450" y="275" width="80" height="87" rx="4" fill="#C26B4A"/>
  <text x="490" y="267" font-size="16" fill="#a8512f" text-anchor="middle">60~150</text>
  <text x="490" y="448" font-size="15" font-weight="600" fill="#444" text-anchor="middle">타일</text>

  <!-- 인조대리석 80~200 -->
  <rect x="575" y="227" width="80" height="116" rx="4" fill="#C26B4A"/>
  <text x="615" y="219" font-size="16" fill="#a8512f" text-anchor="middle">80~200</text>
  <text x="615" y="448" font-size="15" font-weight="600" fill="#444" text-anchor="middle">인조대리석</text>

  <!-- 천연대리석 150~300+ -->
  <rect x="700" y="130" width="80" height="145" rx="4" fill="#A8512F"/>
  <text x="740" y="122" font-size="16" font-weight="700" fill="#a8512f" text-anchor="middle">150~300+</text>
  <text x="740" y="448" font-size="15" font-weight="600" fill="#444" text-anchor="middle">천연대리석</text>

  <text x="40" y="480" font-size="13" fill="#9a9a9a">천연대리석은 하지 보강·타공 기술료가 붙어 상한이 열려 있습니다. 평균 시공가는 80만~120만원대.</text>
</svg>
